<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白茶小屋 - 和好友一起读书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- EPUB 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- PDF 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>

  <!-- ========== 导航栏 ========== -->
  <nav id="navbar" class="navbar hidden">
    <div class="nav-left">
      <button class="nav-back" id="navBack" title="返回">←</button>
      <span class="nav-title" id="navTitle">白茶小屋</span>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="nav-logout" id="navLogout">退出</button>
    </div>
  </nav>

  <!-- ========== Toast 提示 ========== -->
  <div id="toast" class="toast hidden"></div>

  <!-- ========== 登录/注册页 ========== -->
  <div id="page-auth" class="page active">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">📚</span>
        <h1>白茶小屋</h1>
        <p class="auth-subtitle">和好友一起读书，分享每一处感悟</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="authForm" class="auth-form">
        <div class="form-group">
          <label for="authEmail">邮箱</label>
          <input type="email" id="authEmail" placeholder="请输入邮箱" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="authPassword">密码</label>
          <input type="password" id="authPassword" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="current-password">
        </div>
        <div class="form-group" id="usernameGroup" style="display:none">
          <label for="authUsername">昵称</label>
          <input type="text" id="authUsername" placeholder="给自己取个昵称" maxlength="20">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="authSubmit">登录</button>
      </form>
      <div class="auth-footer">
        <p id="authSwitch">还没有账号？<a href="#" id="authSwitchLink">去注册</a></p>
      </div>
    </div>
  </div>

  <!-- ========== 书架页 ========== -->
  <div id="page-bookshelf" class="page">
    <div class="bookshelf-header">
      <h2>我的书架</h2>
      <button class="btn btn-primary" id="btnUploadBook">📖 上传新书</button>
    </div>

    <!-- 上传书籍弹窗 -->
    <div id="uploadModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>上传新书</h3>
          <button class="modal-close" id="closeUploadModal">✕</button>
        </div>
        <div class="upload-method-tabs">
          <button class="upload-method-tab active" data-method="file">📁 上传文件</button>
          <button class="upload-method-tab" data-method="paste">📋 粘贴文本</button>
        </div>

        <!-- 文件上传方式 -->
        <div id="uploadMethodFile" class="upload-method-panel active">
          <div class="upload-dropzone" id="uploadDropzone">
            <span class="dropzone-icon">📂</span>
            <p>拖拽文件到此处，或点击选择</p>
            <p class="dropzone-hint">支持 EPUB、Markdown、TXT 格式</p>
            <input type="file" id="bookFileInput" accept=".epub,.md,.txt,.markdown" hidden>
          </div>
          <div id="fileInfo" class="file-info hidden">
            <span id="fileName"></span>
            <button class="btn btn-sm" id="btnRemoveFile">移除</button>
          </div>
          <div class="form-group">
            <label for="bookTitle">书名</label>
            <input type="text" id="bookTitle" placeholder="例如：红楼梦" required>
          </div>
          <div class="form-group">
            <label for="bookAuthor">作者</label>
            <input type="text" id="bookAuthor" placeholder="例如：曹雪芹">
          </div>
          <div class="form-group">
            <label for="bookCover">封面（可选）</label>
            <input type="text" id="bookCover" placeholder="输入图片链接，或留空">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btnUploadFile">上传</button>
        </div>

        <!-- 粘贴文本方式 -->
        <div id="uploadMethodPaste" class="upload-method-panel">
          <div class="form-group">
            <label for="bookTitle2">书名</label>
            <input type="text" id="bookTitle2" placeholder="例如：红楼梦">
          </div>
          <div class="form-group">
            <label for="bookAuthor2">作者</label>
            <input type="text" id="bookAuthor2" placeholder="例如：曹雪芹">
          </div>
          <div class="form-group">
            <label for="bookContent">书籍内容</label>
            <textarea id="bookContent" rows="10" placeholder="请粘贴书籍文本内容&#10;&#10;提示：可以从网上下载 txt 版本的红楼梦，复制全部文本粘贴到这里"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btnUploadPaste">上传</button>
        </div>
      </div>
    </div>

    <div id="booksList" class="books-grid">
      <div class="empty-state">📚<br>还没有书籍，上传一本开始读书吧</div>
    </div>
  </div>

  <!-- ========== 书籍详情页（小组） ========== -->
  <div id="page-book-detail" class="page">
    <div class="book-detail-header">
      <h2 id="detailBookTitle">书籍名称</h2>
      <p id="detailBookAuthor" class="text-muted">作者</p>
    </div>
    <div class="section">
      <h3>读书小组</h3>
      <div id="groupsList" class="groups-list">
        <div class="empty-state">👥<br>还没有读书小组</div>
      </div>
    </div>
    <div class="section">
      <button class="btn btn-primary btn-block" id="btnCreateGroup">✨ 创建读书小组</button>
    </div>
    <div class="section">
      <p class="text-muted" style="text-align:center">或</p>
      <button class="btn btn-outline btn-block" id="btnJoinGroup">🔗 输入邀请码加入</button>
    </div>

    <!-- 创建小组弹窗 -->
    <div id="createGroupModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>创建读书小组</h3>
          <button class="modal-close" id="closeCreateGroupModal">✕</button>
        </div>
        <form id="createGroupForm">
          <div class="form-group">
            <label for="groupName">小组名称</label>
            <input type="text" id="groupName" placeholder="例如：红茶小屋小分队" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">创建</button>
        </form>
      </div>
    </div>

    <!-- 加入小组弹窗 -->
    <div id="joinGroupModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>加入读书小组</h3>
          <button class="modal-close" id="closeJoinGroupModal">✕</button>
        </div>
        <form id="joinGroupForm">
          <div class="form-group">
            <label for="inviteCode">邀请码</label>
            <input type="text" id="inviteCode" placeholder="输入好友分享的6位邀请码" maxlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">加入</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ========== 阅读器页 ========== -->
  <div id="page-reader" class="page">
    <div class="reader-toolbar">
      <button class="btn btn-sm" id="btnTogglePanel">☰ 书屋面板</button>
      <span class="reader-progress-text" id="readerProgressText">0%</span>
    </div>
    <div class="reader-layout">
      <div class="reader-main">
        <div class="reader-content" id="readerContent">
          <p class="empty-state">加载中...</p>
        </div>
      </div>
      <div class="reader-panel" id="readerPanel">
        <div class="panel-tabs">
          <button class="panel-tab" data-panel="toc">📑 目录</button>
          <button class="panel-tab active" data-panel="members">👥 成员</button>
          <button class="panel-tab" data-panel="annotations">💬 批注</button>
          <button class="panel-tab" data-panel="comments">🗨️ 讨论</button>
        </div>
        <div class="panel-content">
          <!-- 目录面板 -->
          <div class="panel-page" id="panel-toc">
            <h4>章节导航</h4>
            <div id="tocList" class="toc-list"></div>
          </div>
          <!-- 成员面板 -->
          <div class="panel-page active" id="panel-members">
            <h4>成员阅读进度</h4>
            <div id="membersList" class="members-list"></div>
          </div>
          <!-- 批注面板 -->
          <div class="panel-page" id="panel-annotations">
            <h4>所有批注</h4>
            <div id="annotationsList" class="annotations-list"></div>
          </div>
          <!-- 评论区 -->
          <div class="panel-page" id="panel-comments">
            <h4>小组讨论</h4>
            <div id="commentsList" class="comments-list"></div>
            <div class="comment-input">
              <input type="text" id="commentInput" placeholder="说点什么...">
              <button id="btnSendComment" class="btn btn-sm btn-primary">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 批注输入弹窗 -->
    <div id="annotationModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>写批注</h3>
          <button class="modal-close" id="closeAnnotationModal">✕</button>
        </div>
        <div id="annotationQuote" class="annotation-quote"></div>
        <form id="annotationForm">
          <div class="form-group">
            <textarea id="annotationContent" rows="3" placeholder="写下你的想法..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">保存</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
